name: Build & Bundle Action

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-action:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build TypeScript
        run: npm run build

      - name: Bundle GitHub Action with ncc
        run: npm run build:action

      - name: Commit bundled action
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add action-dist/
          git diff --staged --quiet || git commit -m "chore: bundle action for release [skip ci]"
          git push
